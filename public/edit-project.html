<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Project — Mini-EmailJS</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="stylesheet" href="dashboard.css"/>
</head>
<body>

<div class="topbar">
  <div class="brand">Mini<span class="accent">EmailJS</span></div>
  <div class="topbar-actions">
    <button class="btn btn-ghost btn-sm" id="logout-btn">Sign out</button>
  </div>
</div>

<div class="page">
  <a id="back-link" href="index.html" class="back-link">← Back to project</a>
  <h1>Edit Project</h1>
  <p class="page-subtitle" id="project-name-sub">Loading…</p>

  <div id="content">
    <div class="skeleton" style="height:400px;border-radius:14px;"></div>
  </div>
</div>

<script src="dashboard.js"></script>
<script>
const params    = new URLSearchParams(location.search);
const projectId = params.get('id');
let currentProject = null;

(async () => {
  if (!(await requireAuth())) return;
  wireLogout();
  if (!projectId) { location.href = 'index.html'; return; }

  // Set back link
  document.getElementById('back-link').href = `project.html?id=${encodeURIComponent(projectId)}`;

  const { ok, project, error } = await api(`/api/projects/${encodeURIComponent(projectId)}`);
  if (!ok) {
    document.getElementById('content').innerHTML = `<div class="card"><p class="text-muted">${escapeHtml(error || 'Project not found.')}</p></div>`;
    return;
  }
  currentProject = project;
  document.getElementById('project-name-sub').textContent = project.name;
  renderForm(project);
})();

function renderForm(p) {
  document.getElementById('content').innerHTML = `
    <div class="card">
      <form id="edit-form">

        <!-- Basic info -->
        <div class="section-title">Basic Info</div>
        <div class="form-row">
          <div class="form-group">
            <label for="name">Project name <span class="req">*</span></label>
            <input type="text" id="name" value="${escapeHtml(p.name)}" required/>
            <div class="field-error" id="err-name"></div>
          </div>
          <div class="form-group">
            <label for="toEmail">Recipient email <span class="req">*</span></label>
            <input type="email" id="toEmail" value="${escapeHtml(p.to_email)}" required/>
            <div class="field-error" id="err-toEmail"></div>
          </div>
        </div>

        <div class="form-group">
          <label for="subjectTemplate">Email subject template</label>
          <input type="text" id="subjectTemplate" value="${escapeHtml(p.subject_template)}"/>
          <div class="field-hint">Use <code>{{field_name}}</code> to insert any submitted field.</div>
        </div>

        <div class="form-group">
          <label for="allowedOrigins">Allowed origins</label>
          <input type="text" id="allowedOrigins" value="${escapeHtml((p.allowed_origins || []).join(', '))}"/>
          <div class="field-hint">Comma-separated. Leave blank to allow all origins. Do not include trailing slashes.</div>
        </div>

        <div class="form-group">
          <label for="rateLimit">Rate limit (per IP per hour)</label>
          <input type="number" id="rateLimit" value="${p.rate_limit_per_hour}" min="1" max="1000"/>
        </div>

        <div class="form-group">
          <div class="checkbox-row">
            <input type="checkbox" id="isActive" ${p.is_active ? 'checked' : ''}/>
            <label for="isActive">Project is active (disable to pause all submissions)</label>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Provider -->
        <div class="section-title">Email Provider</div>
        <div class="form-group">
          <label for="provider">Provider</label>
          <select id="provider">
            <option value="resend" ${p.provider === 'resend' ? 'selected' : ''}>Resend (platform default)</option>
            <option value="smtp"   ${p.provider === 'smtp'   ? 'selected' : ''}>My own Gmail / SMTP</option>
          </select>
        </div>

        <div class="form-group">
          <label for="fromEmail">"From" address</label>
          <input type="text" id="fromEmail" value="${escapeHtml(p.from_email)}"/>
        </div>

        <!-- SMTP fields -->
        <div id="smtp-fields" style="display:${p.provider === 'smtp' ? 'block' : 'none'};">
          <div class="card" style="background:var(--surface);border-style:dashed;margin-bottom:18px;">
            <div class="section-title">SMTP / Gmail Settings</div>
            <p class="text-muted mb-16" style="font-size:13px;">
              For Gmail: host <code>smtp.gmail.com</code>, port <code>465</code>, and a
              <a href="https://myaccount.google.com/apppasswords" target="_blank" rel="noopener" style="text-decoration:underline;">16-character App Password</a>
              (no spaces). Requires 2-Step Verification.
            </p>
            <div class="form-row">
              <div class="form-group">
                <label for="smtpHost">SMTP host</label>
                <input type="text" id="smtpHost" value="${escapeHtml((p.provider_config || {}).host || '')}" placeholder="smtp.gmail.com"/>
              </div>
              <div class="form-group">
                <label for="smtpPort">Port</label>
                <input type="number" id="smtpPort" value="${(p.provider_config || {}).port || 587}" placeholder="465"/>
              </div>
            </div>
            <div class="form-group">
              <label for="smtpUser">SMTP username</label>
              <input type="text" id="smtpUser" value="${escapeHtml((p.provider_config || {}).user || '')}" placeholder="you@gmail.com"/>
            </div>
            <div class="form-group">
              <label for="smtpPass">App password</label>
              <input type="text" id="smtpPass" value="" placeholder="Leave blank to keep existing password"/>
              <div class="field-hint">Only fill this in if you want to change the password. Leave blank to keep the current one.</div>
            </div>
          </div>
        </div>

        <div class="flex-between mt-24">
          <a href="project.html?id=${encodeURIComponent(projectId)}" class="btn btn-secondary">Cancel</a>
          <button type="submit" class="btn btn-primary" id="save-btn">Save Changes</button>
        </div>

      </form>
    </div>
  `;

  // Provider toggle
  document.getElementById('provider').addEventListener('change', (e) => {
    document.getElementById('smtp-fields').style.display = e.target.value === 'smtp' ? 'block' : 'none';
  });

  // Form submit
  document.getElementById('edit-form').addEventListener('submit', saveProject);
}

async function saveProject(e) {
  e.preventDefault();
  clearErrors();

  const provider = document.getElementById('provider').value;
  const allowedOrigins = document.getElementById('allowedOrigins').value
    .split(',')
    .map(s => s.trim().replace(/\/$/, '')) // strip trailing slashes automatically
    .filter(Boolean);

  const body = {
    name:            document.getElementById('name').value.trim(),
    toEmail:         document.getElementById('toEmail').value.trim(),
    fromEmail:       document.getElementById('fromEmail').value.trim(),
    provider,
    subjectTemplate: document.getElementById('subjectTemplate').value.trim(),
    allowedOrigins,
    rateLimitPerHour: parseInt(document.getElementById('rateLimit').value, 10) || 20,
    isActive:        document.getElementById('isActive').checked,
  };

  // Build provider config
  if (provider === 'smtp') {
    const existing = currentProject.provider_config || {};
    const newPass  = document.getElementById('smtpPass').value;
    body.providerConfig = {
      host: document.getElementById('smtpHost').value.trim() || existing.host,
      port: parseInt(document.getElementById('smtpPort').value, 10) || existing.port || 587,
      user: document.getElementById('smtpUser').value.trim() || existing.user,
      pass: newPass || existing.pass, // keep existing if blank
    };
  }

  // Validation
  let hasError = false;
  if (!body.name)    { showFieldError('name',    'Project name is required.');    hasError = true; }
  if (!body.toEmail) { showFieldError('toEmail', 'Recipient email is required.'); hasError = true; }
  if (hasError) return;

  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Saving…';

  const { ok, error } = await api(`/api/projects/${encodeURIComponent(projectId)}`, {
    method: 'PATCH',
    body,
  });

  btn.disabled = false;
  btn.textContent = 'Save Changes';

  if (ok) {
    showToast('Project saved successfully.');
    setTimeout(() => {
      location.href = `project.html?id=${encodeURIComponent(projectId)}`;
    }, 800);
  } else {
    showToast(error || 'Failed to save.', 'error');
  }
}

function showFieldError(id, msg) {
  const el  = document.getElementById(id);
  const err = document.getElementById('err-' + id);
  if (el)  el.classList.add('err');
  if (err) { err.textContent = msg; err.classList.add('show'); }
}

function clearErrors() {
  document.querySelectorAll('.field-error').forEach(e => e.classList.remove('show'));
  document.querySelectorAll('input.err').forEach(e => e.classList.remove('err'));
}
</script>
</body>
</html>
