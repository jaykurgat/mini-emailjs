<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mini-EmailJS — Demo Form</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 480px; margin: 60px auto; padding: 0 20px; color: #1a1a1a; }
    h1 { font-size: 1.4rem; }
    label { display: block; font-weight: 600; font-size: 13px; margin: 16px 0 6px; }
    input, textarea { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; font-family: inherit; box-sizing: border-box; }
    textarea { min-height: 100px; resize: vertical; }
    button { margin-top: 20px; width: 100%; padding: 12px; background: #00D49A; border: none; border-radius: 6px; font-weight: 700; font-size: 14px; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    #status { margin-top: 14px; font-size: 13px; }
    #status.success { color: #00A874; }
    #status.error { color: #EF4444; }
    /* Honeypot field — hidden from real users, bots often fill it anyway */
    .hp { position: absolute; left: -9999px; top: -9999px; }
  </style>
</head>
<body>

  <h1>Mini-EmailJS — Demo Form</h1>
  <p style="color:#666;font-size:14px;">
    This form sends a notification email using the platform's <code>/api/send/:projectId</code> endpoint.
    Replace <code>ENDPOINT</code> and <code>API_KEY</code> below with your project's values
    (generated by <code>scripts/create-project.js</code>).
  </p>

  <form id="demo-form">
    <label for="from_name">Your Name</label>
    <input type="text" id="from_name" name="from_name" required/>

    <label for="email">Your Email</label>
    <input type="email" id="email" name="email" required/>

    <label for="message">Message</label>
    <textarea id="message" name="message" required></textarea>

    <!-- Honeypot field: real users never see/fill this; bots often do -->
    <input class="hp" type="text" name="_gotcha" tabindex="-1" autocomplete="off"/>

    <button type="submit">Send</button>
    <div id="status"></div>
  </form>

  <script>
    // ── Configure these two values per project ──
    const ENDPOINT = 'https://YOUR-DEPLOYMENT.vercel.app/api/send/YOUR-PROJECT-ID';
    const API_KEY  = 'YOUR-PROJECT-API-KEY';

    const form = document.getElementById('demo-form');
    const status = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      status.textContent = '';
      status.className = '';

      const btn = form.querySelector('button');
      btn.disabled = true;
      btn.textContent = 'Sending…';

      const data = Object.fromEntries(new FormData(form).entries());
      data.apiKey = API_KEY;

      try {
        const res = await fetch(ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        const result = await res.json();

        if (result.ok) {
          status.textContent = '✅ Message sent successfully!';
          status.className = 'success';
          form.reset();
        } else {
          status.textContent = '❌ ' + (result.error || 'Something went wrong.');
          status.className = 'error';
        }
      } catch (err) {
        status.textContent = '❌ Network error. Please try again.';
        status.className = 'error';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send';
      }
    });
  </script>

</body>
</html>
