<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project — Mini-EmailJS</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="stylesheet" href="dashboard.css"/>
</head>
<body>

<div id="site-topbar">
  <div class="topbar">
    <div class="brand">Mini<span class="accent">EmailJS</span></div>
    <div class="topbar-actions">
      <button class="btn btn-ghost btn-sm" id="logout-btn">Sign out</button>
    </div>
  </div>
</div>

<div class="page">
  <a href="index.html" class="back-link">← Back to projects</a>
  <div id="content">
    <div class="skeleton" style="height:40px;width:240px;border-radius:8px;margin-bottom:8px;"></div>
    <div class="skeleton" style="height:20px;width:160px;border-radius:6px;margin-bottom:24px;"></div>
    <div class="skeleton" style="height:180px;border-radius:14px;"></div>
  </div>
</div>

<!-- Submission detail modal -->
<div class="modal-overlay" id="submission-modal">
  <div class="modal-box" style="max-width:560px;">
    <div class="flex-between mb-16">
      <h3 style="margin:0;">Submission Detail</h3>
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('submission-modal').classList.remove('open')">✕</button>
    </div>
    <div id="submission-detail-content"></div>
  </div>
</div>

<!-- Delete confirmation modal -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal-box">
    <h3>Delete this project?</h3>
    <p>This permanently deletes the project, its API key, and all submission history. This cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="cancel-delete">Cancel</button>
      <button class="btn btn-danger" id="confirm-delete">Delete</button>
    </div>
  </div>
</div>

<!-- Regenerate key modal -->
<div class="modal-overlay" id="regen-modal">
  <div class="modal-box">
    <h3>Regenerate API key?</h3>
    <p>The old key will stop working immediately. Update the embed code on any website using it.</p>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="cancel-regen">Cancel</button>
      <button class="btn btn-primary" id="confirm-regen">Regenerate</button>
    </div>
  </div>
</div>

<script src="dashboard.js"></script>
<script src="form-generator.js"></script>
<script>
// ─────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────
const params    = new URLSearchParams(location.search);
const projectId = params.get('id');
const isNew     = params.get('new') === '1';
let currentProject = null;

// Form builder state (will be loaded from project.form_builder_config)
let selectedFields  = ['name', 'email', 'message'];
let selectedTheme   = 'minimal-light';
let formTitle       = '';
let formSubtitle    = '';
let customFieldRows = [];

const PRESET_FIELDS = [
  { key: 'name',    label: 'Full Name',      required: true,  hasOptions: false },
  { key: 'email',   label: 'Email',          required: true,  hasOptions: false },
  { key: 'phone',   label: 'Phone',          required: false, hasOptions: false },
  { key: 'company', label: 'Company',        required: false, hasOptions: false },
  { key: 'subject', label: 'Subject',        required: false, hasOptions: false },
  { key: 'stack',   label: 'Software Stack', required: false, hasOptions: true,
    presetOptions: 'Zoho Suite, HubSpot, GoHighLevel, Salesforce, Multiple / Unintegrated Platforms, No CRM Currently, Other'
  },
  { key: 'message', label: 'Message',        required: true,  hasOptions: false },
];

// ─────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────
(async () => {
  if (!(await requireAuth())) return;
  wireLogout();
  if (!projectId) {
    document.getElementById('content').innerHTML = `<div class="card"><p class="text-muted">No project specified.</p></div>`;
    return;
  }
  await load();
})();

async function load() {
  const { ok, project, stats, error } = await api(`/api/projects/${encodeURIComponent(projectId)}`);
  if (!ok) {
    document.getElementById('content').innerHTML = `<div class="card"><p class="text-muted">${escapeHtml(error || 'Project not found.')}</p></div>`;
    return;
  }
  currentProject = project;

  // Load persisted form builder config if it exists
  const savedConfig = project.form_builder_config || {};
  if (savedConfig.selectedFields) selectedFields = savedConfig.selectedFields;
  if (savedConfig.selectedTheme)  selectedTheme  = savedConfig.selectedTheme;
  if (savedConfig.formTitle)      formTitle      = savedConfig.formTitle;
  if (savedConfig.formSubtitle)   formSubtitle   = savedConfig.formSubtitle;
  if (savedConfig.customFieldRows) customFieldRows = savedConfig.customFieldRows;

  render(project, stats);
  loadSubmissions();
}

// ─────────────────────────────────────────────────────────────
// Main render
// ─────────────────────────────────────────────────────────────
function render(p, stats) {
  const endpoint    = `${location.origin}/api/send/${p.project_id}`;
  const providerLabel = p.provider === 'smtp' ? 'SMTP / Gmail' : 'Resend';

  document.getElementById('content').innerHTML = `
    ${isNew ? `<div class="card mb-16" style="border-color:var(--accent-border);background:var(--accent-glow);">
      <strong>Project created!</strong> Configure your form below and copy the embed code.
    </div>` : ''}

    <div class="flex-between mb-16">
      <div>
        <h1>${escapeHtml(p.name)}</h1>
        <p class="page-subtitle" style="margin-bottom:0;">
          <span class="pill ${p.is_active ? 'pill-accent' : 'pill-warning'}">
            <span class="pill-dot"></span>${p.is_active ? 'Active' : 'Paused'}
          </span>
          <span class="pill" style="margin-left:6px;">${providerLabel}</span>
        </p>
      </div>
      <div style="display:flex;gap:8px;">
        <a href="edit-project.html?id=${encodeURIComponent(p.project_id)}" class="btn btn-secondary btn-sm">Edit Settings</a>
        <button class="btn btn-danger btn-sm" id="delete-btn">Delete</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="card mb-16">
      <div class="section-title">Submissions</div>
      <div class="stats-row">
        <div class="stat"><div class="stat-val">${stats.total}</div><div class="stat-label">Total</div></div>
        <div class="stat"><div class="stat-val" style="color:var(--accent-dk)">${stats.sent}</div><div class="stat-label">Sent</div></div>
        <div class="stat"><div class="stat-val" style="color:var(--warning)">${stats.blocked}</div><div class="stat-label">Blocked</div></div>
        <div class="stat"><div class="stat-val" style="color:var(--danger)">${stats.error}</div><div class="stat-label">Errors</div></div>
      </div>
    </div>

    <!-- API endpoint + key -->
    <div class="card mb-16">
      <div class="section-title">API Endpoint</div>
      <div class="code-row mb-16">
        <code>${escapeHtml(endpoint)}</code>
        <button class="copy-btn" onclick="copyToClipboard('${escapeHtml(endpoint)}', this)">Copy</button>
      </div>
      <div class="section-title">API Key</div>
      <div class="code-row">
        <code id="api-key-display">${escapeHtml(p.api_key)}</code>
        <button class="copy-btn" onclick="copyToClipboard('${escapeHtml(p.api_key)}', this)">Copy</button>
      </div>
      <div class="flex-between mt-16">
        <span class="text-muted">Key compromised? Rotate it here — old key stops working immediately.</span>
        <button class="btn btn-secondary btn-sm" id="regen-btn">Regenerate</button>
      </div>
    </div>

    <!-- Form Builder -->
    <div class="card mb-16">
      <div class="section-title">Form Builder</div>
      <div id="preview-url-warning" style="display:none;background:#FEF3C7;border:1px solid #F59E0B;border-radius:var(--r);padding:12px 16px;font-size:13px;color:#92400E;margin-bottom:16px;">
        ⚠️ <strong>You're on a Vercel preview URL.</strong> Visit your stable production URL to generate a reliable embed snippet.
      </div>
      <p class="text-muted mb-16">Pick fields, choose a theme, and copy a fully-styled form wired to this project.</p>

      <!-- Fields -->
      <div class="form-group">
        <label>Fields</label>
        <div class="field-picker" id="field-picker"></div>
      </div>

      <!-- Custom fields -->
      <div class="form-group">
        <label>Custom fields <span class="text-muted" style="font-weight:400;">(optional — up to 2)</span></label>
        <div id="custom-fields-list"></div>
        <button class="btn btn-secondary btn-sm mt-16" id="add-custom-field-btn">+ Add custom field</button>
      </div>

      <!-- Theme -->
      <div class="form-group">
        <label>Theme</label>
        <div class="theme-picker" id="theme-picker">
          <div class="theme-card" data-theme="minimal-light">
            <div class="theme-swatch" style="background:#fff;border:1px solid #D8DEE9;color:#0B0F1A;">Aa</div>
            <div class="theme-name">Minimal Light</div>
          </div>
          <div class="theme-card" data-theme="minimal-dark">
            <div class="theme-swatch" style="background:#11151F;color:#F5F7FB;">Aa</div>
            <div class="theme-name">Minimal Dark</div>
          </div>
          <div class="theme-card" data-theme="rounded">
            <div class="theme-swatch" style="background:#fff;border:1px solid #E5E5EA;border-radius:14px;color:#1A1A1A;">Aa</div>
            <div class="theme-name">Rounded</div>
          </div>
        </div>
      </div>

      <!-- Title / subtitle -->
      <div class="form-row">
        <div class="form-group">
          <label for="form-title">Form heading <span class="text-muted" style="font-weight:400;">(optional)</span></label>
          <input type="text" id="form-title" placeholder="e.g. Get in Touch"/>
        </div>
        <div class="form-group">
          <label for="form-subtitle">Subheading <span class="text-muted" style="font-weight:400;">(optional)</span></label>
          <input type="text" id="form-subtitle" placeholder="e.g. We reply within 24 hours."/>
        </div>
      </div>

      <!-- Live preview -->
      <div class="form-group">
        <label>Live Preview</label>
        <div class="form-preview-frame" id="form-preview">
          <p class="text-muted" style="font-size:13px;">Select at least one field to see a preview.</p>
        </div>
      </div>

      <!-- Generated code -->
      <div class="form-group">
        <div class="flex-between mb-16">
          <label style="margin:0;">Generated Code</label>
          <div style="display:flex;gap:8px;">
            <button class="copy-btn" id="copy-generated-btn">Copy code</button>
            <button class="copy-btn" id="save-config-btn">Save config</button>
          </div>
        </div>
        <div class="code-block" id="generated-code" style="min-height:80px;font-size:11.5px;">Select fields above to generate your embed code.</div>
      </div>
    </div>

    <!-- Auto-reply -->
    <div class="card mb-16">
      <div class="section-title">Auto-Reply to Submitter</div>
      <p class="text-muted mb-16">Optionally send an automated confirmation email to whoever fills out the form. Requires an <code>email</code> field to be present.</p>
      <div class="checkbox-row form-group">
        <input type="checkbox" id="auto-reply-enabled" ${p.auto_reply_enabled ? 'checked' : ''}/>
        <label for="auto-reply-enabled">Enable auto-reply confirmation email</label>
      </div>
      <div id="auto-reply-fields" style="display:${p.auto_reply_enabled ? 'block' : 'none'};">
        <div class="form-group">
          <label for="auto-reply-subject">Subject</label>
          <input type="text" id="auto-reply-subject" value="${escapeHtml(p.auto_reply_subject || "Thanks for reaching out — we'll be in touch soon.")}"/>
          <div class="field-hint">Supports <code>{{field_name}}</code> placeholders.</div>
        </div>
        <div class="form-group">
          <label for="auto-reply-body">Message body</label>
          <textarea id="auto-reply-body" style="min-height:140px;">${escapeHtml(p.auto_reply_body || '')}</textarea>
          <div class="field-hint">Plain text. Use <code>\\n</code> for line breaks. Supports <code>{{field_name}}</code> placeholders.</div>
        </div>
        <button class="btn btn-primary btn-sm" id="save-auto-reply-btn">Save auto-reply</button>
      </div>
    </div>

    <!-- Settings summary -->
    <div class="card mb-16">
      <div class="flex-between mb-16">
        <div class="section-title" style="margin:0;">Settings</div>
        <a href="edit-project.html?id=${encodeURIComponent(p.project_id)}" class="btn btn-secondary btn-sm">Edit</a>
      </div>
      <div class="form-group">
        <label>Recipient email</label>
        <div class="text-muted">${escapeHtml(p.to_email)}</div>
      </div>
      <div class="form-group">
        <label>Subject template</label>
        <div class="text-muted" style="font-family:var(--ff-mono);font-size:13px;">${escapeHtml(p.subject_template)}</div>
      </div>
      <div class="form-group">
        <label>Allowed origins</label>
        <div class="text-muted">${p.allowed_origins && p.allowed_origins.length ? p.allowed_origins.map(escapeHtml).join(', ') : 'Any origin (unrestricted)'}</div>
      </div>
      <div class="form-group" style="margin-bottom:0;">
        <label>Rate limit</label>
        <div class="text-muted">${p.rate_limit_per_hour} submissions per IP per hour</div>
      </div>
    </div>

    <!-- Submissions -->
    <div class="card">
      <div class="section-title">Recent Submissions</div>
      <div id="submissions-content">
        <div class="skeleton" style="height:120px;border-radius:8px;"></div>
      </div>
    </div>
  `;

  // Wire buttons
  document.getElementById('delete-btn').addEventListener('click', () => document.getElementById('delete-modal').classList.add('open'));
  document.getElementById('regen-btn').addEventListener('click', () => document.getElementById('regen-modal').classList.add('open'));

  // Auto-reply toggle
  document.getElementById('auto-reply-enabled').addEventListener('change', (e) => {
    document.getElementById('auto-reply-fields').style.display = e.target.checked ? 'block' : 'none';
  });

  // Save auto-reply
  document.getElementById('save-auto-reply-btn').addEventListener('click', saveAutoReply);

  // Init form builder
  initFormBuilder(p);
}

// ─────────────────────────────────────────────────────────────
// Submissions
// ─────────────────────────────────────────────────────────────
async function loadSubmissions() {
  const container = document.getElementById('submissions-content');
  const { ok, submissions, error } = await api(`/api/projects/${encodeURIComponent(projectId)}/submissions?limit=25`);

  if (!ok) {
    container.innerHTML = `<p class="text-muted">${escapeHtml(error || 'Failed to load.')}</p>`;
    return;
  }
  if (!submissions.length) {
    container.innerHTML = `<p class="text-muted">No submissions yet. They'll appear here once your form goes live.</p>`;
    return;
  }

  const statusPill = (s) => {
    if (s === 'sent')    return `<span class="pill pill-accent"><span class="pill-dot"></span>Sent</span>`;
    if (s === 'blocked') return `<span class="pill pill-warning"><span class="pill-dot"></span>Blocked</span>`;
    return `<span class="pill pill-danger"><span class="pill-dot"></span>Error</span>`;
  };

  container.innerHTML = `
    <table>
      <thead>
        <tr><th>When</th><th>Status</th><th>From</th><th>Preview</th><th></th></tr>
      </thead>
      <tbody>
        ${submissions.map((s, i) => {
          const payload = s.payload || {};
          const from    = payload.from_name || payload.email || payload.name || '—';
          const preview = Object.entries(payload).map(([k,v]) => `${k}: ${v}`).join(' · ');
          return `<tr>
            <td>${formatDate(s.created_at)}</td>
            <td>${statusPill(s.status)}</td>
            <td>${escapeHtml(String(from))}</td>
            <td class="payload-preview" title="${escapeHtml(preview)}">${escapeHtml(preview)}</td>
            <td><button class="copy-btn" onclick="showSubmissionDetail(${i})">View</button></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;

  // Store for detail view
  window._submissions = submissions;
}

function showSubmissionDetail(index) {
  const s = window._submissions[index];
  if (!s) return;
  const payload = s.payload || {};

  const rows = Object.entries(payload).map(([k, v]) => `
    <tr>
      <td style="padding:8px 12px;font-weight:600;font-size:13px;color:var(--ink-soft);white-space:nowrap;vertical-align:top;">${escapeHtml(k)}</td>
      <td style="padding:8px 12px;font-size:13px;color:var(--ink-soft);">${escapeHtml(String(v))}</td>
    </tr>`).join('');

  document.getElementById('submission-detail-content').innerHTML = `
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;">
      <span class="pill ${s.status === 'sent' ? 'pill-accent' : s.status === 'blocked' ? 'pill-warning' : 'pill-danger'}">
        <span class="pill-dot"></span>${s.status}
      </span>
      <span class="pill">${formatDate(s.created_at)}</span>
      ${s.ip_address ? `<span class="pill">IP: ${escapeHtml(s.ip_address)}</span>` : ''}
    </div>
    ${s.error_message ? `<div style="background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:10px 14px;font-size:13px;color:#991B1B;margin-bottom:16px;">${escapeHtml(s.error_message)}</div>` : ''}
    <table style="width:100%;border-collapse:collapse;border:1px solid var(--border);border-radius:8px;overflow:hidden;">
      <tbody>${rows}</tbody>
    </table>`;

  document.getElementById('submission-modal').classList.add('open');
}

// ─────────────────────────────────────────────────────────────
// Auto-reply save
// ─────────────────────────────────────────────────────────────
async function saveAutoReply() {
  const btn = document.getElementById('save-auto-reply-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Saving…';

  const { ok, error } = await api(`/api/projects/${encodeURIComponent(projectId)}`, {
    method: 'PATCH',
    body: {
      autoReplyEnabled: document.getElementById('auto-reply-enabled').checked,
      autoReplySubject: document.getElementById('auto-reply-subject').value.trim(),
      autoReplyBody:    document.getElementById('auto-reply-body').value,
    },
  });

  btn.disabled = false;
  btn.textContent = 'Save auto-reply';

  if (ok) {
    showToast('Auto-reply settings saved.');
  } else {
    showToast(error || 'Failed to save.', 'error');
  }
}

// ─────────────────────────────────────────────────────────────
// Form Builder
// ─────────────────────────────────────────────────────────────
function initFormBuilder(p) {
  renderFieldChips();
  applyThemeSelection();

  // Restore saved title/subtitle
  const titleEl    = document.getElementById('form-title');
  const subtitleEl = document.getElementById('form-subtitle');
  if (titleEl)    titleEl.value    = formTitle;
  if (subtitleEl) subtitleEl.value = formSubtitle;

  renderCustomFields();
  bindBuilderEvents();
  regenerateCode();

  // Detect preview URL
  const hostname  = location.hostname;
  const isPreview = /vercel\.app$/.test(hostname) && hostname.split('-').length > 3;
  if (isPreview) {
    document.getElementById('preview-url-warning').style.display = 'block';
  }
}

function renderFieldChips() {
  const picker = document.getElementById('field-picker');
  if (!picker) return;

  picker.innerHTML = PRESET_FIELDS.map(f => {
    const checked = selectedFields.includes(f.key);
    const cantDeselect = f.required;
    return `<label class="field-chip ${checked ? 'checked' : ''} ${cantDeselect ? 'required-chip' : ''}" data-key="${f.key}" title="${cantDeselect ? 'Required field — cannot remove' : ''}">
      ${escapeHtml(f.label)}${f.required ? '<span class="req-star"> *</span>' : ''}
    </label>`;
  }).join('');

  picker.querySelectorAll('.field-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const key    = chip.dataset.key;
      const preset = PRESET_FIELDS.find(f => f.key === key);
      if (preset && preset.required) return;

      if (selectedFields.includes(key)) {
        selectedFields = selectedFields.filter(k => k !== key);
        chip.classList.remove('checked');
      } else {
        selectedFields.push(key);
        chip.classList.add('checked');
      }
      regenerateCode();
    });
  });
}

function applyThemeSelection() {
  document.querySelectorAll('.theme-card').forEach(card => {
    card.classList.toggle('selected', card.dataset.theme === selectedTheme);
  });
}

function bindBuilderEvents() {
  // Theme cards
  document.querySelectorAll('.theme-card').forEach(card => {
    card.addEventListener('click', () => {
      document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedTheme = card.dataset.theme;
      regenerateCode();
    });
  });

  // Title / subtitle
  document.getElementById('form-title').addEventListener('input', e => { formTitle = e.target.value; regenerateCode(); });
  document.getElementById('form-subtitle').addEventListener('input', e => { formSubtitle = e.target.value; regenerateCode(); });

  // Add custom field
  document.getElementById('add-custom-field-btn').addEventListener('click', () => {
    if (customFieldRows.length >= 2) { showToast('Maximum 2 custom fields.', 'error'); return; }
    customFieldRows.push({ id: Date.now(), label: '', name: '', type: 'text', options: '' });
    renderCustomFields();
  });

  // Copy generated code
  document.getElementById('copy-generated-btn').addEventListener('click', (e) => {
    const code = document.getElementById('generated-code').textContent;
    if (code && !code.startsWith('Select fields')) {
      copyToClipboard(code, e.target);
    } else {
      showToast('Select at least one field first.', 'error');
    }
  });

  // Save config
  document.getElementById('save-config-btn').addEventListener('click', saveBuilderConfig);
}

function renderCustomFields() {
  const container = document.getElementById('custom-fields-list');
  const addBtn    = document.getElementById('add-custom-field-btn');
  if (!container) return;

  container.innerHTML = customFieldRows.map(row => `
    <div class="custom-field-row" data-id="${row.id}" style="margin-bottom:14px;">
      <div class="form-group" style="margin:0;">
        <label>Label</label>
        <input type="text" class="cf-label" placeholder="e.g. Budget" value="${escapeHtml(row.label || '')}"/>
      </div>
      <div class="form-group" style="margin:0;">
        <label>Name (no spaces)</label>
        <input type="text" class="cf-name" placeholder="e.g. budget" value="${escapeHtml(row.name || '')}"/>
      </div>
      <div class="form-group" style="margin:0;">
        <label>Type</label>
        <select class="cf-type">
          <option value="text"     ${row.type === 'text'     ? 'selected':''}>Text</option>
          <option value="email"    ${row.type === 'email'    ? 'selected':''}>Email</option>
          <option value="tel"      ${row.type === 'tel'      ? 'selected':''}>Phone</option>
          <option value="select"   ${row.type === 'select'   ? 'selected':''}>Dropdown</option>
          <option value="textarea" ${row.type === 'textarea' ? 'selected':''}>Textarea</option>
        </select>
      </div>
      <button class="remove-field-btn" data-id="${row.id}" style="align-self:flex-end;height:38px;width:38px;background:var(--white);border:1px solid var(--border-md);border-radius:var(--r);color:var(--danger);cursor:pointer;font-size:16px;">×</button>
      ${row.type === 'select' ? `
      <div class="form-group" style="margin:0;grid-column:1/-1;">
        <label>Options (comma-separated)</label>
        <input type="text" class="cf-options" placeholder="Option 1, Option 2, Option 3" value="${escapeHtml(row.options || '')}"/>
      </div>` : ''}
    </div>`).join('');

  addBtn.style.display = customFieldRows.length >= 2 ? 'none' : '';

  container.querySelectorAll('.custom-field-row').forEach(rowEl => {
    const id  = Number(rowEl.dataset.id);
    const ref = customFieldRows.find(r => r.id === id);
    if (!ref) return;

    rowEl.querySelector('.cf-label').addEventListener('input', e => {
      ref.label = e.target.value;
      const nameInput = rowEl.querySelector('.cf-name');
      if (!nameInput.value) {
        nameInput.value = e.target.value.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
        ref.name = nameInput.value;
      }
      regenerateCode();
    });
    rowEl.querySelector('.cf-name').addEventListener('input', e => {
      ref.name = e.target.value.replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
      e.target.value = ref.name;
      regenerateCode();
    });
    rowEl.querySelector('.cf-type').addEventListener('change', e => {
      ref.type = e.target.value;
      renderCustomFields();
      regenerateCode();
    });
    const optsInput = rowEl.querySelector('.cf-options');
    if (optsInput) {
      optsInput.addEventListener('input', e => { ref.options = e.target.value; regenerateCode(); });
    }
    rowEl.querySelector('.remove-field-btn').addEventListener('click', () => {
      customFieldRows = customFieldRows.filter(r => r.id !== id);
      renderCustomFields();
      regenerateCode();
    });
  });
}

function getCustomFieldsForGenerator() {
  return customFieldRows.filter(r => r.label && r.name).map(r => ({
    label: r.label, name: r.name, type: r.type,
    options: r.type === 'select'
      ? r.options.split(',').map(o => o.trim()).filter(Boolean)
      : [],
  }));
}

function regenerateCode() {
  if (!currentProject) return;

  const codeEl    = document.getElementById('generated-code');
  const previewEl = document.getElementById('form-preview');
  if (!codeEl || !previewEl) return;

  const customFields = getCustomFieldsForGenerator();

  if (!selectedFields.length && !customFields.length) {
    codeEl.textContent = 'Select at least one field to generate your embed code.';
    previewEl.innerHTML = '<p class="text-muted" style="font-size:13px;">Select at least one field to see a preview.</p>';
    return;
  }

  const snippet = generateFormSnippet({
    endpoint:       `${location.origin}/api/send/${currentProject.project_id}`,
    apiKey:         currentProject.api_key,
    selectedFields,
    customFields,
    theme:          selectedTheme,
    title:          formTitle,
    subtitle:       formSubtitle,
  });

  codeEl.textContent = snippet;

  // Live preview — strip the script block
  previewEl.innerHTML = snippet
    .replace(/<script[\s\S]*?<\/script>/gi, '')
    + `<p style="font-size:11px;color:#8A99B4;margin-top:8px;text-align:center;">↑ Visual preview only — submission disabled</p>`;
}

async function saveBuilderConfig() {
  const btn = document.getElementById('save-config-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const config = {
    selectedFields,
    selectedTheme,
    formTitle,
    formSubtitle,
    customFieldRows: customFieldRows.map(({ id, ...rest }) => rest), // strip transient id
  };

  const { ok, error } = await api(`/api/projects/${encodeURIComponent(projectId)}`, {
    method: 'PATCH',
    body: { formBuilderConfig: config },
  });

  btn.disabled = false;
  btn.textContent = 'Save config';
  showToast(ok ? 'Form config saved.' : (error || 'Failed to save.'), ok ? 'success' : 'error');
}

// ─────────────────────────────────────────────────────────────
// Delete modal
// ─────────────────────────────────────────────────────────────
document.getElementById('cancel-delete').addEventListener('click', () => document.getElementById('delete-modal').classList.remove('open'));
document.getElementById('confirm-delete').addEventListener('click', async () => {
  const btn = document.getElementById('confirm-delete');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Deleting…';
  const { ok, error } = await api(`/api/projects/${encodeURIComponent(projectId)}`, { method: 'DELETE' });
  if (ok) {
    location.href = 'index.html';
  } else {
    showToast(error || 'Failed to delete.', 'error');
    btn.disabled = false; btn.textContent = 'Delete';
  }
});

// ─────────────────────────────────────────────────────────────
// Regenerate key modal
// ─────────────────────────────────────────────────────────────
document.getElementById('cancel-regen').addEventListener('click', () => document.getElementById('regen-modal').classList.remove('open'));
document.getElementById('confirm-regen').addEventListener('click', async () => {
  const btn = document.getElementById('confirm-regen');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Regenerating…';
  const { ok, project, error } = await api(`/api/projects/${encodeURIComponent(projectId)}/regenerate-key`, { method: 'POST' });
  btn.disabled = false; btn.textContent = 'Regenerate';
  document.getElementById('regen-modal').classList.remove('open');
  if (ok) {
    showToast('API key regenerated.');
    currentProject = project;
    await load();
  } else {
    showToast(error || 'Failed.', 'error');
  }
});

// Close modals on overlay click / escape
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
});
</script>
</body>
</html>
