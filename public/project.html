<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Redirecting…</title>
</head>
<body>
  <script>
    const id = new URLSearchParams(location.search).get('id');
    location.replace(id ? 'app.html#overview&id=' + encodeURIComponent(id) : 'app.html#projects');
  </script>
</body>
</html>
